<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN Systems</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
      overflow: hidden;
    }

    .topbar {
      height: 58px;
      background: linear-gradient(90deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .status {
      font-size: 13px;
      color: #93c5fd;
    }

    .frame-wrap {
      width: 100%;
      height: calc(100vh - 58px);
      background: #0b1120;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    .loading {
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .sub {
      color: #93c5fd;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">GN SYSTEMS</div>
    <div class="status" id="statusText">Carregando sistema...</div>
  </div>

  <div class="frame-wrap">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwGfCWxFeqpim3Rx5UgEWZ5HvP6Hg-eP6oC05WyvvW1Vp2qhkKnQ1vz8K2N7kDT6ge5/exec"
      allow="camera; microphone"
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
  </div>

  <div class="loading" id="loading">
    <div class="logo">GN SYSTEMS</div>
    <div class="sub">Carregando plataforma...</div>
  </div>

  <script>
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");
    const statusText = document.getElementById("statusText");

    function finalizarCarregamento() {
      loading.classList.add("hidden");
      statusText.textContent = "Sistema online";
    }

    frame.addEventListener("load", finalizarCarregamento);

    setTimeout(finalizarCarregamento, 4000);
  </script>

</body>
</html>
